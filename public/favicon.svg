<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#6EE7FF" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glowColor"/>
      <feMerge>
        <feMergeNode in="glowColor"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="hexGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#6EE7FF" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glowColor"/>
      <feMerge>
        <feMergeNode in="glowColor"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="#090B10"/>

  <!-- Hexagon outline -->
  <polygon
    points="256,52 438,148 438,364 256,460 74,364 74,148"
    fill="none"
    stroke="#6EE7FF"
    stroke-width="3"
    opacity="0.35"
    filter="url(#hexGlow)"
  />

  <!-- "aD" monogram -->
  <text
    x="256"
    y="296"
    text-anchor="middle"
    font-family="'Space Grotesk', 'Segoe UI', sans-serif"
    font-weight="700"
    font-size="210"
    fill="#3A86FF"
    filter="url(#glow)"
    letter-spacing="-8"
  >aD</text>
</svg>
